# Deploy to Azure Web App - imperioncrm (Linux, NODE|24-lts).
#
# Ships SOURCE and lets Azure Oryx build on the server (npm install + npm run
# build + npm start). The previous pipeline built on the runner and shipped the
# result via actions/upload-artifact, which dropped the node_modules/.bin/next
# symlink -> `next start` exited 127 -> container failed to start -> 503.
# Server-side build (App setting SCM_DO_BUILD_DURING_DEPLOYMENT=true) avoids that.
name: Build and deploy Node.js app to Azure Web App - imperioncrm

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for the azure/login OIDC token
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C3671CC81225493DA4E75CF90B1B6917 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A8892DC7DD8147B0A5A77AD9D291ADD1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1BAC47B85DE240948E6DED7D3C2A0490 }}

      - name: Deploy source to Azure Web App (Oryx builds on server)
        uses: azure/webapps-deploy@v3
        with:
          app-name: imperioncrm
          slot-name: Production
          package: .
