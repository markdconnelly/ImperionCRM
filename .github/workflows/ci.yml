name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    # Build-time only. Auth env vars are intentionally absent here (real values
    # live in App Service); env.ts is fail-closed at runtime, not build time.
    # AUTH_SECRET is a throwaway so Auth.js initialises during `next build`.
    env:
      AUTH_SECRET: ci-build-only-not-a-real-secret
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          # Match the App Service runtime and the deploy workflow (Node 24 LTS).
          node-version: 24
      # INTERIM: using `npm install` (not `npm ci`) and no npm cache because the
      # repo has no committed package-lock.json yet — the dev host that would
      # generate it had Node network-blocked by an Intune firewall policy. Once
      # the lockfile is committed, restore `cache: npm` + `npm ci`.
      - run: npm install --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build

  test:
    # Required PR check (#188, v1 gate 11): the vitest suite must pass before merge.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      # INTERIM: `npm install` until package-lock.json is committed (see build job).
      - run: npm install --no-audit --no-fund
      - name: Test
        run: npm test

  docs:
    # Documentation validation gate (CLAUDE.md §8). PRs fail if required docs
    # are missing. Lightweight checks now; expand to markdownlint, link-check,
    # OpenAPI validation, diagram generation, and ADR formatting as docs grow.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Required /docs structure exists
        run: |
          required=(architecture security agents integrations database api \
            workflows deployment runbooks disaster-recovery operations \
            user-guides admin-guides testing decision-records diagrams \
            compliance data-governance)
          missing=0
          for d in "${required[@]}"; do
            if [ ! -d "docs/$d" ]; then
              echo "::error::Missing required docs directory: docs/$d"
              missing=1
            fi
          done
          exit $missing
      - name: ADR index is generated, deduped, and frontmatter-complete (ADR-0090)
        run: node scripts/adr-index.mjs --check

  icm-conformance:
    # ICM conformance gate (ADR-0088, issues #699 + #702 / epic #695). Validates
    # every workspace manifest under icm/ against icm/agent.schema.json (shape),
    # the workflow ⊆ domain ⊆ Constitution least-privilege invariant, AND that
    # every okf_rooms entry resolves to a concept-bearing row in the OKF coverage
    # matrix (docs/database/semantic-layer/coverage-matrix.md, #702). The same
    # pure-function checks the backend loader (#162) runs. No-ops cleanly while
    # the domain tier is still unpopulated. Runs on PRs and push to main.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Validate workspace agent.yaml manifests
        run: node scripts/agent-yaml-gate.mjs

  semantic-layer:
    # OKF semantic-layer docs-gate (ADR-0086, issue #535). A PR whose migrations
    # change a silver table that already has a concept file under
    # docs/database/semantic-layer/tables/ must update that file in the same PR,
    # else fail. Escape hatch: the `semantic-layer-not-affected` label (justify in
    # the PR body). PR-only — there is no base/label context on push to main.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # need base-branch history to diff the PR
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Gate silver migrations on bundle sync
        env:
          # `contains(...)` -> "true"/"false"; the script reads HAS_ESCAPE_HATCH.
          HAS_ESCAPE_HATCH: ${{ contains(github.event.pull_request.labels.*.name, 'semantic-layer-not-affected') }}
        run: |
          git fetch --no-tags origin "$GITHUB_BASE_REF"
          CHANGED_FILES="$(git diff --name-only "origin/$GITHUB_BASE_REF"...HEAD)"
          REMOVED_FILES="$(git diff --name-only --diff-filter=D "origin/$GITHUB_BASE_REF"...HEAD)"
          export CHANGED_FILES REMOVED_FILES
          echo "Changed files:"; echo "$CHANGED_FILES" | sed 's/^/  /'
          echo "Removed files:"; echo "$REMOVED_FILES" | sed 's/^/  /'
          node scripts/semantic-layer-gate.mjs

  claude-md:
    name: CLAUDE.md meta-policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Required CLAUDE.md meta-policy anchors present
        shell: bash
        run: |
          f=CLAUDE.md
          miss=0
          req=("What this project is" "architectural principles" "Technology stack" "Never commit secrets" "Current state" "Working agreement" "unified-security-standard.md" "docs/decision-records")
          for p in "${req[@]}"; do
            if ! grep -qiF "$p" "$f"; then echo "::error file=$f::missing required meta-policy anchor: $p"; miss=1; fi
          done
          if [ "$miss" -ne 0 ]; then exit 1; fi
          echo "CLAUDE.md: all 8 meta-policy anchors present"
