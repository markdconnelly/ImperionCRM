# CONSTITUTION.yaml — the OUTER least-privilege allow-list (ADR-0088 §3).
#
# Machine-readable companion to CONSTITUTION.md: the widest set of tools and OKF
# rooms any ICM worker may EVER be granted. A domain's room.yaml narrows this; a
# workflow's agent.yaml narrows further. The invariant the gate enforces is
#     workflow ⊆ domain ⊆ Constitution
# (scripts/agent-yaml-gate.mjs). Widening at any inner tier is a conformance
# failure. This file is the only place a NEW capability enters the agent layer —
# adding a tool/room here is a deliberate, reviewed unit of work.
#
# The budget-file convention itself (this file + domains/<d>/room.yaml) — its
# name, location, {tools, okf_rooms} shape, and the absent-tier degradation rule
# (a missing budget falls back to the next-lower declared list) — is ratified by
# ADR-0089 (consolidated into ADR-0091), extending ADR-0088 §3. The clauses it
# enforces are ratified separately (CONSTITUTION.md §3/§5).
#
# No secrets, no client PII (these files replicate to every agent machine,
# ADR-0060). Tool and room names are references, never values.

# Tools: the union of every capability the agent workforce may be granted.
# Names are stable tool identifiers the backend loader maps to implementations.
tools:
  - pg.read              # read-only silver/gold reads (ADR-0086 OKF rooms)
  - consent.check        # assert a current consent basis (Governance, gates sends)
  - send.email           # approval-gated email send (ADR-0058 path only)
  - send.dm              # approval-gated in-channel DM reply (ADR-0058 path only)
  - send.sms             # approval-gated SMS via ACS (ADR-0058 path only)
  - booking.link         # mint/lookup a booking link (no PII, no send)
  - ticket.note          # write an INTERNAL Autotask work-note (operational, not
                         #   client-facing; approval-gated executor, never a direct
                         #   silver write). Service workspace, #1067.
  - opportunity.write    # create/update the INTERNAL CRM opportunity record
                         #   (operational, reversible; no customer-facing side
                         #   effect; approval-gated executor, never a direct silver
                         #   write). Sales workspace, #1416 — the L2 auto-internal
                         #   capability on the canonical ladder (ADR-0128).
  - content.write        # create/update the INTERNAL content_asset record (Belle's
                         #   typed authored artifact — draft/status/publish_ref/brand
                         #   note; operational, internal-reversible; approval-gated
                         #   executor, never a direct silver write). Marketing
                         #   content-studio, #1701 — L2 auto-internal (ADR-0128).
                         #   Publish is a HANDOFF to Loveable (D3), not a send.
  - reference.write      # create/update the INTERNAL reference record (consent-gated
                         #   captured customer proof; approval-gated executor, never a
                         #   direct silver write). Marketing advocacy-capture, #1702 —
                         #   an L2 internal write, but the data is client_pii so the
                         #   data-class ceiling parks it; logo/name-use rights are a
                         #   separate workflow-layer always_gate (#1696 D4).
  - knowledge.search     # OKF-grounded semantic recall over gold (#1537 retrieval
                         #   tier; read-only; returns cited gold knowledge objects).
  - memory.recall        # deliberate long-term memory recall (Memory MCP, ADR-0116;
                         #   read-only; returns cited memory_drawer captures).
  - delegate             # EXECUTIVE-ONLY: hand a unit of work to exactly one
                         #   sub-agent. Orchestration, not actuation — no business
                         #   effect of its own (Executive-Suite tier ADR, #1535).
  - handoff              # EXECUTIVE-ONLY: transfer an in-flight context to another
                         #   agent or the human queue. Orchestration, not actuation.

# OKF rooms: the union of every silver entity any worker may read. Each name
# resolves to a docs/database/semantic-layer/ coverage-matrix row (ADR-0086).
okf_rooms:
  - contact
  - account
  - opportunity
  - interaction
  - consent_event
  - lead_score
  - campaign
  # Marketing / Demand workspace (ADR-0124 unified social plane; ADR-0073 journeys) —
  # Belle's Stream 01 (Demand → Lead) read surface. Owned by the marketing agent; the
  # social/ad/journey entities the demand engine grounds, composes, and reports on.
  - social_post              # compose-once social post (the single composition)
  - social_post_channel      # its per-network adaptation (fan-out target)
  - social_engagement        # inbound social interaction (DM / comment / mention)
  - social_metric            # organic post/channel performance
  - ad                       # paid placement (Belle drafts; spend stays always_gate)
  - campaign_send            # the per-send email/campaign fact (consent-gated)
  - campaign_metric          # campaign performance (attribution, reporting)
  - lead_hook                # raw inbound lead-capture hook (pre-dedupe)
  - workflow                 # journey / nurture cadence definition (ADR-0073)
  - contact_social_identity  # social handle → contact match (inbound author-link)
  # Marketing content/advocacy/brand expansion (#1696, D2) — Belle's brand/content half:
  # typed authored content, consent-gated customer proof, and the human-owned brand registry.
  - content_asset            # typed authored marketing artifact (content/enablement/PR); #1697
  - reference                # consent-gated captured customer proof (advocacy); #1698
  - brand_asset              # human-owned brand registry — agent READ-ONLY (D5); read by
                             #   content-studio's review-gate + Vera's marketing-conformance; #1699
  - ticket           # Service workspace (#1067) — Autotask-SoR ticket (read)
  - device           # Service workspace — endpoint/network CI status (read)
  - cloud_asset      # Service workspace — cloud resource CI status (read)
  - problem          # Service workspace (#1577, ADR-0079 amended) — app-native
                     #   ITIL problem / root-cause investigation record (read)
  - known_error      # Service workspace (#1577, ADR-0079 amended) — known-error
                     #   + workaround register a problem emits (read)
  - change_request   # Service workspace (#656, ADR-0079) — app-native ITIL change
                     #   working object (typed standard|normal|emergency) (read)
  - change_freeze    # Service/Change-Release (#1579, ADR-0079) — freeze-calendar
                     #   window; an overlap is a hard always_gate block (read)
  - rollback_plan    # Service/Change-Release (#1579, ADR-0079) — change rollback
                     #   artifact with its own draft→approved sign-off (read)
  - standard_change_catalog # Service/Change-Release (#1579, ADR-0079) —
                     #   pre-authorized standard-change template library (read)
  - strategic_business_review  # Client-Success workspace (#1442) — QBR/SBR
                               #   substrate Celeste reads for QBR-prep + health
  - contract           # Client-Success workspace (#1687) — agreement/expiry/terms
                       #   (kernel/op silver); Celeste reads it for renewal-readiness
                       #   (08-E) to ground on real renewal dates + terms (read)
  - time_record       # Finance workspace (#1423) — monthly-close time fact (read)
  - timesheet         # Finance workspace — attested timesheet (read)
  - expense_item      # Finance workspace — monthly-close expense fact (read)
  - expense_report    # Finance workspace — attested expense report (read)
  - invoice           # Finance workspace — QBO read-only invoice mirror (read)
  - generated_invoice # Finance workspace — app-native invoice draft pre-QBO (read)
  - license_assignment # Finance workspace — agreement/true-up license facts (read)
  - budget            # Finance FP&A (#1718, epic #1394) — human-authored operating plan;
                      #   agent READ-ONLY, SELECT-only incl. backend (D5/ADR-0123) (read)
  - metric_definition # Finance FP&A — governed metric contracts (MRR/ARR/margin/cost_to_serve);
                      #   the metric layer Audrey CONSUMES, never re-derives (#1050) (read)
  - posture_snapshot   # Platform/Governance (#1458) — client security posture (read)
  - tenant_posture     # Platform/Governance — per-tenant posture drift (read)
  - posture_policy     # Platform/Governance — posture policy + golden baselines (read)
  - agent_autopilot_policy # Platform/Governance — the autonomy dial Vera observes (read)
  - entity_xref        # Platform/Governance — the identity spine (read)
  - partner            # Partnerships workspace (#1623/#1624) — app-native channel/
                       #   alliance partner (SELL-side; the twin of buy-side
                       #   procurement). Bridget reads (read)
  - partner_deal       # Partnerships workspace (#1623/#1624) — co-sell/referral
                       #   registration + attribution (the Bridget→Chase seam) (read)
  - partner_mdf        # Partnerships workspace (#1657) — market-development-fund
                       #   request→spend→ROI; money always-gate at the sub-agent.
                       #   Deputy-CFO reads for partner-economics oversight (read)
  - referral_payout    # Partnerships workspace (#1657) — referral-partner payout
                       #   pending→approved→paid; money always-gate at the sub-agent.
                       #   Deputy-CFO reads for partner-economics oversight (read)
