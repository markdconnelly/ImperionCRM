# room.yaml — the dispatch domain's least-privilege budget (ADR-0088 §3).
#
# Machine-readable companion to room.md. Narrows icm/CONSTITUTION.yaml: the most
# any dispatch workflow may be granted. A workflow's agent.yaml narrows this
# further (workflow ⊆ domain ⊆ Constitution; gate: scripts/agent-yaml-gate.mjs).
# Every entry here MUST itself appear in icm/CONSTITUTION.yaml.
#
# No secrets, no client PII (ADR-0060). Names are references, never values.

reports_to: cto   # Scout reports to Dexter (CTO / Delivery division)

# Dispatch is thin — it leans on Autotask native dispatch. It reads the ticket,
# the account, and the device to match a technician, and may write an INTERNAL
# Autotask work-note (the proposed assignment — operational, never client-facing).
# No send budget — the customer-facing schedule confirmation is gated.
tools:
  - pg.read
  - knowledge.search
  - memory.recall
  - ticket.note

# The dispatch data scope.
okf_rooms:
  - ticket
  - account
  - device
