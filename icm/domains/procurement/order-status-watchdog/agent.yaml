  - ../../../CONSTITUTION.md
  - ../room.md
  - ../vance.md
  - ./prose.md
okf_rooms: [account, invoice]                                       # subset of domains/procurement/room.yaml — the client spine + the billed consequence (QBO RO mirror)
tools: [pg.read]                                                    # watch + alert only; no write, no send, no order touched
skills:
  - ./skills/order-sla-rubric           # Tier 3 — workflow-local (placed→provisioned→billed ladder + stall/failure vs SLA + alert shape)
