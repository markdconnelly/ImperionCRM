name: under-licensing-flag
model: claude-sonnet-4-5
system_compose:                       # ordered; Constitution -> domain room -> Vance persona -> workflow prose (ADR-0088 §2)
  - ../../../CONSTITUTION.md
  - ../room.md
  - ../vance.md
  - ./prose.md
okf_rooms: [license_assignment, account]                            # subset of domains/procurement/room.yaml — entitlement facts + client spine
tools: [pg.read]                                                    # cross-ref + classify + flag only; no write, no send, no money move
skills:
  - ./skills/compliance-exposure-rubric   # Tier 3 — workflow-local (exposure classes + severity ladder + the risk-over-cost rule)
autonomy_rung: L2
auto_may_self_approve: "auto-raise the internal compliance-exposure flag at L2 from CITED entitlement-vs-catalog facts, each carrying the catalog version and its as-of date (A5; internal, reversible — a flag can be dismissed, A10 row 1). Vance errs to RISK OVER COST-CUTTING: an exposure beats a saving, and the cheaper under-licensed path is never quietly chosen (vance.md §3). NEVER auto-runs: any remediation buy or license true-up commitment — money out is always_gate forever (ADR-0109, migration 0184) and splits out to the governed-procurement money gate (02-B2; BO-03 Procurement §5). The flag informs; a human spends."
