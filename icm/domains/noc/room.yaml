# room.yaml — the noc domain's least-privilege budget (ADR-0088 §3).
#
# Machine-readable companion to room.md. Narrows icm/CONSTITUTION.yaml: the most
# any NOC workflow may be granted. A workflow's agent.yaml narrows this further
# (workflow ⊆ domain ⊆ Constitution; gate: scripts/agent-yaml-gate.mjs). Every
# entry here MUST itself appear in icm/CONSTITUTION.yaml.
#
# No secrets, no client PII (ADR-0060). Names are references, never values.

reports_to: cto   # Ozzie reports to Dexter (CTO / Delivery division)

# NOC workers read the operational substrate an alert correlates against and may
# write an INTERNAL Autotask work-note (operational, never client-facing — the
# triage finding and any remediation record). No send budget — v1 NOC does not
# reach an external party.
tools:
  - pg.read
  - knowledge.search
  - memory.recall
  - ticket.note

# The NOC data scope — the rooms an alert-triage worker may read.
okf_rooms:
  - device
  - cloud_asset
  - ticket
  - account
