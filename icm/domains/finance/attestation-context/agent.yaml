name: attestation-context
model: claude-sonnet-4-5
system_compose:                       # ordered; Constitution -> domain room -> Audrey persona -> workflow prose (ADR-0088 §2)
  - ../../../CONSTITUTION.md
  - ../room.md
  - ../audrey.md
  - ./prose.md
okf_rooms: [timesheet, time_record, expense_report, expense_item]   # subset of domains/finance/room.yaml
tools: [pg.read]                                                     # read + flag only; no write, no money move
skills:
  - ./skills/deviation-rubric           # Tier 3 — workflow-local (hard-deviation rubric + tie-out)
autonomy_rung: L2
auto_may_self_approve: "auto-raise the internal time/expense deviation flag + reconciliation memory-jogger from MEASURED attested facts (internal, reversible — a flag can be dismissed) at L2, always labeling measured figure vs derived. No approval, no posting, no money move, no QBO push at any rung (QBO is the system of record, ADR-0123). Individual salary / Pay Rate is used in the math but NEVER disclosed (salary non-disclosure refusal-class, audrey.md)."
