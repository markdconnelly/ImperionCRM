# room.yaml — the bcdr domain's least-privilege budget (ADR-0088 §3).
#
# Machine-readable companion to room.md. Narrows icm/CONSTITUTION.yaml: the most
# any BCDR workflow may be granted. A workflow's agent.yaml narrows this further
# (workflow ⊆ domain ⊆ Constitution; gate: scripts/agent-yaml-gate.mjs). Every
# entry here MUST itself appear in icm/CONSTITUTION.yaml.
#
# No secrets, no client PII (ADR-0060). Names are references, never values.

reports_to: cto   # Phoenix reports to Dexter (CTO / Delivery division)

# BCDR workers verify backup success and run sandbox test-restores, then report
# RPO/RTO evidence. They may write an INTERNAL Autotask work-note (the
# verification finding — operational, never client-facing). No send budget; the
# PRODUCTION restore is always gated.
tools:
  - pg.read
  - knowledge.search
  - memory.recall
  - ticket.note

# The BCDR data scope.
okf_rooms:
  - device
  - cloud_asset
  - account
