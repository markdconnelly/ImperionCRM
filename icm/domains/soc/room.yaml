# room.yaml — the soc domain's least-privilege budget (ADR-0088 §3).
#
# Machine-readable companion to room.md. Narrows icm/CONSTITUTION.yaml: the most
# any SOC workflow may be granted. A workflow's agent.yaml narrows this further
# (workflow ⊆ domain ⊆ Constitution; gate: scripts/agent-yaml-gate.mjs). Every
# entry here MUST itself appear in icm/CONSTITUTION.yaml.
#
# No secrets, no client PII (ADR-0060). Names are references, never values.

reports_to: deputy-ciso   # Cyrus reports to Roman (Deputy CISO; Mark is CISO)

# SOC workers triage detections and enrich them with Microsoft-sourced threat
# intel. v1 tracers do NOT actuate — read + ground only; containment is proposed,
# Roman approves. No send/isolate tool is in the domain budget.
tools:
  - pg.read
  - knowledge.search
  - memory.recall

# The SOC data scope — asset, identity, and posture context for a detection.
okf_rooms:
  - device
  - cloud_asset
  - account
  - posture_snapshot
