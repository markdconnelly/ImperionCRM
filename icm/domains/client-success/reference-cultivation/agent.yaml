auto_may_self_approve: "ONLY the INTERNAL, reversible creation of the consented `reference` candidate (`reference.write`, status up to `consented`) may self-execute at L2 once admin-flipped to auto — AND ONLY after a human approved the solicitation send AND a `consent_event` with scope was recorded. The SOLICITATION SEND (stage 03) is a customer-relationship-sensitive, non-routine first touch → human-approved at EVERY rung, never auto, exits only via ADR-0058. NO-COMMITS-EVER + MSSP-advisory-only are dial-proof (celeste.md). The Celeste→Belle handoff is a record handoff, never a client-contact path for Belle. Anything not named here parks."
