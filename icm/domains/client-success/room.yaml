# room.yaml — the client-success domain's least-privilege budget (ADR-0088 §3).
#
# Machine-readable companion to room.md. Narrows icm/CONSTITUTION.yaml: the most
# any client-success workflow may be granted. A workflow's agent.yaml narrows this
# further (workflow ⊆ domain ⊆ Constitution; gate: scripts/agent-yaml-gate.mjs).
# Every entry here MUST itself appear in icm/CONSTITUTION.yaml.
#
# No secrets, no client PII (ADR-0060). Names are references, never values.

reports_to: deputy-cfo   # Celeste reports to Sterling (Revenue/Client/Finance division)

# Client-Success workers READ broadly (Celeste is the client-360 — the broadest
# read scope of any agent) and act narrowly: draft/propose, share advisories with
# consent, and mint the expansion opportunity to hand to Chase (opportunity.write,
# the L2 seam). The dial-proof NO-COMMITS ceiling means no tool here ever commits a
# roadmap/SLA/price/spend/remediation — those route to a human, always (celeste.md
# guardrail 1). No silver write tool for the Account Success Plan / risk register in
# v1 — those run products are Postgres run rows (Layer 4), granted a tool if/when a
# workflow needs to persist beyond the run.
tools:
  - pg.read
  - consent.check        # assert a current consent basis (gates any client send)
  - send.email           # approval-gated advisory / save-outreach (ADR-0058 path)
  - send.dm              # approval-gated in-channel touch (ADR-0058 path)
  - opportunity.write    # the L2 seam: auto-create the expansion opportunity →
                         #   assign to Chase (Chase owns the close, celeste.md §Seams)
  - reference.write      # the advocacy seam (#1703/#1692): after a human-gated
                         #   solicitation + recorded consent, write the consented
                         #   `reference` candidate handed to Belle's advocacy-capture
                         #   (Stream 01-O). Internal-reversible L2; the SEND stays
                         #   human-gated (ADR-0058). Celeste owns the client touch;
                         #   Belle never contacts the client (epic #1696 D4, BO-04).
  - knowledge.search     # the enablement-content CONSUME seam (#1690, 08-M/08-N): read-only
                         #   OKF-grounded recall over gold for the how-to / runbook a share
                         #   needs. Celeste CONSUMES; she does not author. The library is
                         #   owned by Alivia/Knowledge + IT Glue back-sync (LP #408); 💤dormant
                         #   until the content store + Voyage recall (#389) hydrate — A5c:
                         #   propose-only, never present dormant content as live.

# The client-success data scope — the rooms a CS worker may read. Celeste's read is
# the broadest of any agent: the whole relationship picture (account/contact),
# the transaction (opportunity), engagement + service signals (interaction/ticket),
# the QBR substrate (strategic_business_review), expansion (lead_score), and the
# consent ledger that gates every client touch.
okf_rooms:
  - account
  - contact
  - opportunity
  - interaction
  - ticket
  - strategic_business_review
  - lead_score
  - consent_event
  - contract             # renewal-readiness (08-E, #1687): the agreement/expiry/terms
                         #   read so renewal assessment grounds on real dates + terms.
                         #   Read-only kernel/op silver; no binding line — the renewal
                         #   posture + price + close stay gated (NO-COMMITS, Chase owns).
  - cloud_asset          # vCIO tech-lifecycle (08-I, #1689): direct read of cloud
                         #   resource CI status (EOL / refresh-due). Felix/Service owns
                         #   the CMDB SoR; Celeste reads it read-only. Resolves the
                         #   direct-read-vs-handoff contradiction in favor of a direct
                         #   grant so 08-I runs before the #991 bus.
  - device               # vCIO tech-lifecycle (08-I, #1689): direct read of endpoint/
                         #   network CI status (age / warranty / OS). Read-only; Felix SoR.
  - posture_snapshot     # vCISO posture-review (08-K, #1689): direct read of the
                         #   MEASURED posture finding (Secure Score + pillars + drift).
                         #   `sec` data_class → audit-by-reference, NO PII reproduction
                         #   (Vera precedent). Celeste reads Vera's measured snapshot
                         #   read-only and FRAMES it for the client — she never re-scores
                         #   (the MSSP/vCISO-advisory boundary, celeste.md guardrail 2).
  - stakeholder          # the per-account relationship/influence map (#1695): who is
                         #   champion / economic-buyer / technical / influencer / user /
                         #   detractor + influence + sentiment + active-vs-departed.
                         #   champion→departed is the leading churn signal (08-D); read-only,
                         #   signal-labeled by source (never assert a detractor w/o evidence).
  - reference            # the advocacy seam (#1703/#1692): the reference candidate
                         #   Celeste cultivates → consents → hands to Belle (Stream 01-O)
