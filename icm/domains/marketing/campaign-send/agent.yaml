auto_may_self_approve: "a ROUTINE send — consent-clean, to a KNOWN/established audience within frequency caps, with a clean audit (ADR-0128 L3 routine, execute-then-notify); a send to a NEW or materially larger audience is a dial-proof always_gate blast (staged, a human commits); any unsubstantiated claim, an opt-out/consent violation, or any audit failure parks for a human in every mode. Money (paid boost/ad) never enters this workflow."
