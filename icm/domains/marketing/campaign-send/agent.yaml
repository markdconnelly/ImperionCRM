name: campaign-send
model: claude-sonnet-4-5
system_compose:                       # ordered; Constitution -> domain room -> Belle persona -> workflow prose (ADR-0088 §2)
  - ../../../CONSTITUTION.md
  - ../room.md
  - ../belle.md
  - ./prose.md
okf_rooms: [campaign, campaign_send, contact, consent_event, campaign_metric]   # subset of domains/marketing/room.yaml
tools: [pg.read, consent.check, send.email, knowledge.search, memory.recall]    # subset of domains/marketing/room.yaml — ground + consent-check + the gauntlet-gated backend send (ADR-0058)
