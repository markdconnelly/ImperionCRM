name: conformance-engine
model: claude-sonnet-4-5
system_compose:                       # ordered; Constitution -> domain room -> Vera persona -> workflow prose (ADR-0088 §2)
  - ../../../CONSTITUTION.md
  - ../room.md
  - ../vera.md
  - ./prose.md
okf_rooms: [entity_xref]                                            # subset of domains/platform/room.yaml — identity spine, to resolve which client/agent a finding is about; the trace itself is governance substrate (agent_run, IKF n/a), read by pg.read, not an okf_room
tools: [pg.read]                                                    # read + evaluate only; no correction, no re-run, no config change (audit-and-recommend)
skills:
  - ./skills/conformance-rubric         # Tier 3 — workflow-local (Defined-Way ruleset shape + conform-vs-diverge + signal-vs-inference + audit-by-reference)
autonomy_rung: L2
auto_may_self_approve: "auto-RUN the conformance audit (read a completed agent-run process trace + the domain's Defined-Way ruleset) and AUTO-SURFACE the resulting conformance finding (conform / diverged, with the rule + the evidence BY REFERENCE) to the governance dashboard at L2 — internal, reversible (a finding can be dismissed), always labeling measured divergence vs inference. AUDIT-BY-REFERENCE: cite the location (run X, field Y), NEVER reproduce the sensitive value (vera.md, peer of Audrey's salary gag). NO correction, NO re-run, NO rewrite, NO config change at any rung — every correction is always_gate to the owning agent/human; deviation routing + closure is A9 (#1467). Vera audits the levers; she never holds them."
