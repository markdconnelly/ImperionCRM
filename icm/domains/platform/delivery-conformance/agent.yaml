name: delivery-conformance
model: claude-sonnet-4-5
system_compose:                       # ordered; Constitution -> domain room -> Vera persona -> workflow prose (ADR-0088 §2)
  - ../../../CONSTITUTION.md
  - ../room.md
  - ../vera.md
  - ./prose.md
okf_rooms: [entity_xref]                                            # subset of domains/platform/room.yaml — identity spine, to resolve which client/project a finding is about; the Pierce trace itself is governance substrate (agent_run, IKF n/a), read by pg.read, not an okf_room
tools: [pg.read]                                                    # read + evaluate only; no correction, no re-run, no re-provision, no config change (audit-and-recommend)
skills:
  - ./skills/delivery-defined-way       # Tier 3 — workflow-local (Pierce's Defined Way as a checkable ruleset: plan-anchored, milestone-integrity, no-unapproved-provision, change-control)
autonomy_rung: L2
auto_may_self_approve: "auto-RUN the delivery conformance audit (read a completed Pierce process trace + the delivery Defined-Way ruleset) and AUTO-SURFACE the resulting conformance finding (conform / diverged, with the rule + the evidence BY REFERENCE) to the governance dashboard at L2 — internal, reversible (a finding can be dismissed), always labeling measured divergence vs inference. AUDIT-BY-REFERENCE: cite the location (run X, field Y), NEVER reproduce the sensitive value — client PII, project financials (vera.md). NO correction, NO re-run, NO re-provision, NO config change at any rung — every correction is always_gate to Pierce / a human; deviation routing + closure is A9 (deviation-lifecycle, #1467). Vera audits the levers; she never holds them."
