name: security-drift-detection
model: claude-sonnet-4-5
system_compose:                       # ordered; Constitution -> domain room -> Vera persona -> workflow prose (ADR-0088 §2)
  - ../../../CONSTITUTION.md
  - ../room.md
  - ../vera.md
  - ./prose.md
okf_rooms: [posture_score, posture_snapshot, tenant_posture, security_standard_version, entity_xref]   # subset of domains/platform/room.yaml — the verdict ledger (0256) + the snapshot/tenant evidence behind a new failure + the version the verdicts bind to + the identity spine
tools: [pg.read]                                                    # read + compare + draft only; the ledger is append-only (0256) — no re-score in place, no write, no remediation
skills:
  - domains/platform/skills/posture-scoring-method   # Tier 2 — domain-shared (the drift definition: downgrade / band drop / new failure, and what is noise; shared with B2/B5)
autonomy_rung: L2
auto_may_self_approve: "auto-RUN the drift detection on a fresh posture_score verdict (compare the client's newest verdict vs its prior verdicts under the SAME ratified standard version — a version change is B5's re-evaluation, never drift) and AUTO-SURFACE the advisory drift finding (status downgrade / band drop / new criterion failure, each labeled MEASURED vs INFERRED) to the governance dashboard, AUTO-ROUTING it to Celeste for client presentation — internal, reversible; a CRITICAL drift additionally auto-surfaces to Mark. Noise is never drift: within-band movement, a data-gap flip to not-assessable, or a cross-version comparison is stated as such, never escalated. AUDIT-BY-REFERENCE: cite verdict ids + criterion ids, NEVER reproduce posture values (vera.md). NO re-score (the ledger is append-only, 0256), NO DB write, NO remediation, NO client contact at any rung — Vera measures; Celeste presents; a human/Datto remediates (the MSSP boundary). Drift findings route via Celeste, never the A9 deviation queue."
