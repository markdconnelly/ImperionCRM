# room.yaml — the sales domain's least-privilege budget (ADR-0088 §3).
#
# Machine-readable companion to room.md. Narrows icm/CONSTITUTION.yaml: the most
# any sales workflow may be granted. A workflow's agent.yaml narrows this further
# (workflow ⊆ domain ⊆ Constitution; gate: scripts/agent-yaml-gate.mjs). Every
# entry here MUST itself appear in icm/CONSTITUTION.yaml.
#
# No secrets, no client PII (ADR-0060). Names are references, never values.

reports_to: deputy-cfo   # Chase reports to Sterling (Revenue/Client/Finance division)

# Sales workers may read/draft/send on the lead→opportunity motion. SMS is NOT
# in the sales budget (channel-rules: SMS is follow-up-only and opt-in — granted
# per-workflow if/when a workflow needs it, not domain-wide).
tools:
  - pg.read
  - consent.check
  - send.email
  - send.dm
  - booking.link
  - opportunity.write    # internal CRM opportunity create/update (reversible, no
                         #   customer-facing effect) — the L2 auto-internal write
                         #   for the opportunity-create workflow (#1416, ADR-0128).
  - knowledge.search     # OKF-grounded semantic recall over gold (#1537 retrieval
                         #   tier; read-only) — prior winning bids + win-loss
                         #   patterns for rfp-response (02-C5) / win-loss-analysis
                         #   (02-C7). Read-only; no write, no send path.
  - memory.recall        # deliberate long-term memory recall (Memory MCP, ADR-0116;
                         #   read-only) — the same two synthesis/assembly workflows.

# The sales data scope — the rooms a sales worker may read.
okf_rooms:
  - contact
  - account
  - opportunity
  - interaction
  - consent_event
  - lead_score
  - campaign
