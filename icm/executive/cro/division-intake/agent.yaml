name: division-intake
model: claude-sonnet-4-5
system_compose:                       # ordered; Constitution -> cro room -> Jessica persona -> workflow prose (ADR-0088 §2)
  - ../../../CONSTITUTION.md
  - ../room.md
  - ../jessica.md
  - ./prose.md
okf_rooms: [account, entity_xref]     # subset of executive/cro/room.yaml; the minimal context to confirm the unit + pick the report
tools: [pg.read, knowledge.search, memory.recall, delegate, handoff]   # the delegate-only exec budget; this workflow routes, so it uses delegate/handoff
skills: []
autonomy_rung: L2                     # delegate — Jessica routes a delegated unit to one report; the exec ceiling is L2 delegate-only (CONSTITUTION §9). She never actuates; assurance is audit/recommend-only.
auto_may_self_approve: "route + delegate to exactly one report when the intent maps unambiguously to a single division owner (Vera/Tess/Alivia), within the asking human's authority and one client/owner RLS scope. Ambiguous ownership, a unit spanning reports, a corrective/governance/config effect, or anything exceeding authority parks for Mark. Jessica never actuates, the assurance line stays audit/recommend-only, and she never bypasses the report's gauntlet."
