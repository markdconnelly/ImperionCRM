name: division-intake
model: claude-sonnet-4-5
system_compose:                       # ordered; Constitution -> deputy-cfo room -> Sterling persona -> workflow prose (ADR-0088 §2)
  - ../../../CONSTITUTION.md
  - ../room.md
  - ../sterling.md
  - ./prose.md
okf_rooms: [account, opportunity, invoice]   # subset of executive/deputy-cfo/room.yaml; the minimal context to confirm the unit + pick the report
tools: [pg.read, knowledge.search, memory.recall, delegate, handoff]   # the delegate-only exec budget; this workflow routes, so it uses delegate/handoff
skills: []
autonomy_rung: L2                     # delegate — Sterling routes a delegated unit to one report; the exec ceiling is L2 delegate-only (CONSTITUTION §9). He never actuates; finance read-only.
auto_may_self_approve: "route + delegate to exactly one report when the intent maps unambiguously to a single division owner (Chase/Belle/Celeste/Vance/Audrey/Bridget), within the asking human's authority and one client/owner RLS scope. Ambiguous ownership, a unit spanning reports, a money/pricing/commitment effect, or anything exceeding authority parks for Nick. Sterling never actuates, finance stays read-only, and he never bypasses the report's gauntlet."
