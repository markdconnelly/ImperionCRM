name: division-intake
model: claude-sonnet-4-5
system_compose:                       # ordered; Constitution -> chief-of-staff room -> Rachel persona -> workflow prose (ADR-0088 §2)
  - ../../../CONSTITUTION.md
  - ../room.md
  - ../rachel.md
  - ./prose.md
okf_rooms: [account, contact]         # subset of executive/chief-of-staff/room.yaml; the minimal context to confirm the unit + pick the report
tools: [pg.read, knowledge.search, memory.recall, delegate, handoff]   # the delegate-only exec budget; this workflow routes, so it uses delegate/handoff
skills: []
autonomy_rung: L2                     # delegate — Rachel routes a delegated unit to one report; the exec ceiling is L2 delegate-only (CONSTITUTION §9). She never actuates.
auto_may_self_approve: "route + delegate to exactly one report when the intent maps unambiguously to a single division owner (Holly for people/HR/employee-lifecycle, Laurel for legal/contracts), within the asking human's authority and one client/owner RLS scope. Ambiguous ownership, a unit spanning reports, a binding commitment (a signed contract, an employment/comp decision), or anything exceeding authority parks for Derek. Rachel never actuates and never bypasses the report's gauntlet."
