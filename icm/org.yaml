# org.yaml — the Imperion OS org chart (single source of truth).
#
# This file is DATA — the org SoT the GUI (/org, #1539), the public promo org
# chart, and the org-graph generator (scripts/gen-org-graph.mjs) derive from. It
# is NOT a DB schema.
#
# Two layers, one chart:
#   1. The AGENT tree — one orchestrator (Nova) + 5 C-suite + 21 domain agents.
#      Structure mirrors the filesystem: each `role` is a dir under icm/executive/;
#      each `domain` is a dir under icm/domains/. A domain's `reports_to` names its
#      C-suite role; executives report to the orchestrator; the orchestrator to no
#      one. The conformance gate (scripts/agent-yaml-gate.mjs) enforces the agent
#      reports_to from each room.yaml + the filesystem — NOT from this file.
#   2. The HUMAN org — the 7 real staff (`humans:`), with their own reports_to.
#      Every agent node carries `human_manager:` = the human it ultimately answers
#      to (may differ from its agent-manager's human — a deliberate hybrid).
#
# `ceiling` is the agent's PERSONA hard-cap on the canonical L0–L5 ladder (ADR-0128);
# C-suite are L2-delegate-only (structural, enforced by the gate). The per-workflow
# ladder setting (agent.yaml autonomy_rung, L0–L3) narrows from the ceiling.
# `title`/`summary` are public-render fields (the org chart is classified
# public-approved PII). `serves` = org-design intent (not a gate).
# No secrets, no client PII (ADR-0060). Persona names are references, not values.

orchestrator:
  role: orchestrator
  persona: Nova
  dir: icm/executive/orchestrator
  ceiling: L2-delegate-only
  serves: company
  human_manager: derek
  title: Orchestrator
  summary: "The single agent every employee talks to; routes work and synthesizes one answer."
  note: replaces the prior "Jarvis" working name (ADR-0131).

executives:
  - role: chief-of-staff
    persona: Rachel
    dir: icm/executive/chief-of-staff
    reports_to: orchestrator
    serves: Derek
    human_manager: derek
    division: Internal Ops / G&A
    ceiling: L2-delegate-only
    title: Chief of Staff
    summary: "Turns cross-company status into a short honest brief and protects the CEO's attention."
    domains: [people, legal]

  - role: cto
    persona: Dexter
    dir: icm/executive/cto
    reports_to: orchestrator
    serves: Derek/Mark/Luke/Brandon/Anna
    human_manager: luke
    division: Service Delivery & Engineering
    ceiling: L2-delegate-only
    title: CTO
    summary: "Owns the delivery machine and leads with operational risk."
    domains: [service, noc, problem-mgmt, change-release, dispatch, bcdr, projects]

  - role: deputy-ciso
    persona: Roman
    dir: icm/executive/deputy-ciso
    reports_to: orchestrator
    serves: Mark
    human_manager: mark
    division: Security & Compliance
    ceiling: L2-delegate-only
    title: Deputy CISO
    summary: "Holds the security picture across detection, posture, and identity."
    domains: [soc, grc, identity]

  - role: deputy-cfo
    persona: Sterling
    dir: icm/executive/deputy-cfo
    reports_to: orchestrator
    serves: Nick
    human_manager: nick
    division: Revenue / Client / Finance
    ceiling: L2-delegate-only
    title: Deputy CFO
    summary: "Holds the money picture and leads with what's leaking."
    domains: [sales, marketing, client-success, procurement, finance, partnerships]

  - role: cro
    persona: Jessica
    dir: icm/executive/cro
    reports_to: orchestrator
    serves: Mark
    human_manager: mark
    division: Platform & Assurance
    ceiling: L2-delegate-only
    title: Chief Risk Officer
    summary: "Independent assurance over conformance, quality, and control drift."
    domains: [platform, service-quality, knowledge]

# Domain agents (icm/domains/<domain>/). `built` = has a room.yaml today; the rest
# are scaffolded by their epics (#1551-1562). The persona file is the domain-dir
# `.md` that is not room.md. `human_manager` is the human the agent answers to (may
# differ from its C-suite's human — a deliberate hybrid).
domains:
  - { domain: people,          persona: Holly,    reports_to: chief-of-staff, human_manager: derek, ceiling: L3, built: true,  title: "People & HR",               summary: "Supports the employee lifecycle with discretion." }
  - { domain: legal,           persona: Laurel,   reports_to: chief-of-staff, human_manager: mark,  ceiling: L2, built: true,  title: "Legal",                     summary: "Manages contracts and legal review." }
  - { domain: service,         persona: Felix,    reports_to: cto,         human_manager: brandon, ceiling: L1, built: true,  title: "Service Desk",              summary: "Front-line ticket triage and resolution." }
  - { domain: noc,             persona: Ozzie,    reports_to: cto,         human_manager: brandon, ceiling: L4, built: false, title: "NOC",                       summary: "Watches monitoring and turns alert patterns into action." }
  - { domain: problem-mgmt,    persona: Sage,     reports_to: cto,         human_manager: luke,    ceiling: L3, built: false, title: "Problem Management (L3)",   summary: "Tier-3 root-cause analysis on recurring incidents." }
  - { domain: change-release,  persona: Marshall, reports_to: cto,         human_manager: brandon, ceiling: L2, built: false, title: "Change & Release",          summary: "Governs changes so nothing ships without a real fallback." }
  - { domain: dispatch,        persona: Scout,    reports_to: cto,         human_manager: brandon, ceiling: L3, built: false, title: "Dispatch",                  summary: "Schedules and commits technicians to the work." }
  - { domain: bcdr,            persona: Phoenix,  reports_to: cto,         human_manager: brandon, ceiling: L3, built: false, title: "Business Continuity & DR",  summary: "Owns backups and recovery readiness." }
  - { domain: projects,        persona: Pierce,   reports_to: cto,         human_manager: anna,    ceiling: L2, built: true,  title: "Projects",                  summary: "Runs project delivery and the seams where projects fail." }
  - { domain: soc,             persona: Cyrus,    reports_to: deputy-ciso, human_manager: mark,    ceiling: L4, built: false, title: "SOC",                       summary: "Detects and contains security threats." }
  - { domain: grc,             persona: Grace,    reports_to: deputy-ciso, human_manager: mark,    ceiling: L2, built: false, title: "GRC",                       summary: "Holds posture, evidence, and control gaps." }
  - { domain: identity,        persona: Osiris,   reports_to: deputy-ciso, human_manager: mark,    ceiling: L3, built: false, title: "Identity & Access",         summary: "Manages joiner-mover-leaver and least-privilege access." }
  - { domain: sales,           persona: Chase,    reports_to: deputy-cfo,  human_manager: derek,   ceiling: L3, built: true,  title: "Sales",                     summary: "Qualifies leads and moves the pipeline." }
  - { domain: marketing,       persona: Belle,    reports_to: deputy-cfo,  human_manager: derek,   ceiling: L3, built: true,  title: "Marketing",                 summary: "Runs demand generation and protects the brand." }
  - { domain: client-success,  persona: Celeste,  reports_to: deputy-cfo,  human_manager: caity,   ceiling: L4, built: true,  title: "Client Success",            summary: "Owns client health and renewals." }
  - { domain: procurement,     persona: Vance,    reports_to: deputy-cfo,  human_manager: nick,    ceiling: L2, built: true,  title: "Procurement",               summary: "Manages vendor spend and renewals." }
  - { domain: finance,         persona: Audrey,   reports_to: deputy-cfo,  human_manager: nick,    ceiling: L2, built: true,  title: "Finance",                   summary: "Read-only finance reporting and the monthly close." }
  - { domain: partnerships,    persona: Bridget,  reports_to: deputy-cfo,  human_manager: nick,    ceiling: L3, built: true,  title: "Partnerships",              summary: "Builds channel/alliance/co-sell partnerships and registers partner-sourced deals." }
  - { domain: platform,        persona: Vera,     reports_to: cro,         human_manager: mark,    ceiling: L2, built: true,  title: "Platform Governance",       summary: "Watches platform conformance; recommends, never fixes." }
  - { domain: service-quality, persona: Tess,     reports_to: cro,         human_manager: mark,    ceiling: L2, built: false, title: "Service Quality",           summary: "Judges the finished service experience." }
  - { domain: knowledge,       persona: Alivia,   reports_to: cro,         human_manager: mark,    ceiling: L3, built: false, title: "Knowledge",                 summary: "Keeps documentation current and verified." }

# The 7 real staff. Derek (CEO) is the top of the human org; everyone else reports
# to a human here. Agents point into this layer via `human_manager`. The org chart
# is classified public-approved PII (marketed); still no client PII, no secrets.
humans:
  - { key: derek,   name: Derek,   role: CEO,                      reports_to: null,  title: "Chief Executive Officer",           summary: "Sets company direction and holds final approval across the business." }
  - { key: mark,    name: Mark,    role: CISO,                     reports_to: derek, title: "Chief Information Security Officer", summary: "Owns security, risk, and data governance; co-owns company policy." }
  - { key: nick,    name: Nick,    role: CFO,                      reports_to: derek, title: "Chief Financial Officer",           summary: "Owns finance, revenue, and commercial commitments." }
  - { key: luke,    name: Luke,    role: Senior Systems Architect, reports_to: derek, title: "Senior Systems Architect",          summary: "Technical lead for service delivery and engineering." }
  - { key: brandon, name: Brandon, role: Cloud Engineer,           reports_to: luke,  title: "Cloud Engineer",                    summary: "Runs cloud infrastructure and front-line technical operations." }
  - { key: anna,    name: Anna,    role: Senior Project Manager,   reports_to: derek, title: "Senior Project Manager",            summary: "Leads project delivery and timelines." }
  - { key: caity,   name: Caity,   role: Account Manager,          reports_to: derek, title: "Account Manager",                   summary: "Owns client relationships and client success." }
